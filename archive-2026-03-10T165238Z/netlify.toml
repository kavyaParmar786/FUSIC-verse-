netlify.toml
# Deploy dashboard.html as the static site on Netlify.
# Place dashboard_export.json in the same folder or use a GitHub Action to push it.

[build]
  publish = "."      # Root of the repo is the site

[[headers]]
  for = "/dashboard_export.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache"