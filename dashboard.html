<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FUSIC VERSE — Ticket Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#1e1f22;--surface:#2b2d31;--card:#313338;
    --accent:#5865f2;--green:#23a559;--red:#f23f43;
    --yellow:#f0b232;--text:#dbdee1;--muted:#80848e;--border:#3f4147;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;display:flex;min-height:100vh}

  /* Sidebar */
  .sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);
    padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;overflow-y:auto}
  .logo{padding:0 18px 20px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .logo h2{font-size:17px;font-weight:800;color:var(--accent)}
  .logo p{font-size:12px;color:var(--muted);margin-top:2px}
  nav a{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--muted);
    text-decoration:none;font-size:14px;font-weight:500;transition:.15s;border-left:3px solid transparent}
  nav a:hover,nav a.active{background:rgba(88,101,242,.12);color:var(--accent);border-left-color:var(--accent)}
  nav a span{font-size:17px}

  /* Main */
  .main{margin-left:210px;flex:1;padding:28px 32px}
  .page-title{font-size:22px;font-weight:700;margin-bottom:22px}
  .subtitle{color:var(--muted);font-size:13px;margin-top:4px}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px}
  .card{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border);position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
  .card.green::before{background:var(--green)}.card.red::before{background:var(--red)}.card.yellow::before{background:var(--yellow)}
  .card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .card-value{font-size:30px;font-weight:800;margin-top:8px}

  /* Sections */
  .section{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:22px;overflow:hidden}
  .section-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;
    display:flex;align-items:center;justify-content:space-between}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);
     letter-spacing:.04em;border-bottom:1px solid var(--border)}
  td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(63,65,71,.4)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.03)}

  /* Badges */
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600}
  .badge-open  {background:rgba(35,165,89,.2);  color:var(--green)}
  .badge-closed{background:rgba(128,132,142,.2);color:var(--muted)}
  .badge-low   {background:rgba(35,165,89,.2);  color:var(--green)}
  .badge-normal{background:rgba(88,101,242,.2); color:var(--accent)}
  .badge-high  {background:rgba(240,178,50,.2); color:var(--yellow)}
  .badge-urgent{background:rgba(242,63,67,.2);  color:var(--red)}

  /* Charts */
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
  .chart-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:18px}
  .chart-card h3{font-size:13px;font-weight:700;margin-bottom:14px}

  /* Refresh */
  .refresh{background:var(--accent);color:#fff;border:none;padding:6px 14px;
    border-radius:7px;font-size:12px;cursor:pointer;font-weight:600}
  .refresh:hover{background:#4752c4}

  /* Updated */
  #updated{color:var(--muted);font-size:11px}

  /* Loading */
  .loading{text-align:center;padding:48px;color:var(--muted)}
  .loading div{font-size:40px;margin-bottom:10px}

  /* Error */
  .error-banner{background:rgba(242,63,67,.15);border:1px solid var(--red);border-radius:8px;
    padding:12px 16px;margin-bottom:20px;color:var(--red);font-size:13px;display:none}

  @media(max-width:700px){
    .sidebar{display:none}.main{margin-left:0}
    .chart-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <h2>🎫 FUSIC VERSE</h2>
    <p>Ticket Dashboard</p>
  </div>
  <nav>
    <a href="#" class="active" onclick="showSection('overview')"><span>📊</span> Overview</a>
    <a href="#" onclick="showSection('tickets')"><span>🎫</span> Tickets</a>
    <a href="#" onclick="showSection('staff')"><span>👥</span> Staff</a>
  </nav>
</aside>

<main class="main">
  <div id="error-banner" class="error-banner"></div>

  <!-- ─ OVERVIEW ─ -->
  <section id="sec-overview">
    <div class="page-title">
      📊 Dashboard Overview
      <div class="subtitle" id="updated">Loading…</div>
    </div>

    <div class="cards" id="stat-cards">
      <div class="loading"><div>⏳</div>Loading data…</div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <h3>📈 Tickets by Category</h3>
        <canvas id="catChart" height="220"></canvas>
      </div>
      <div class="chart-card">
        <h3>📊 Open vs Closed</h3>
        <canvas id="statusChart" height="220"></canvas>
      </div>
    </div>
  </section>

  <!-- ─ TICKETS ─ -->
  <section id="sec-tickets" style="display:none">
    <div class="page-title">🎫 All Tickets
      <button class="refresh" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="section" id="tickets-table-wrap">
      <div class="loading"><div>⏳</div>Loading…</div>
    </div>
  </section>

  <!-- ─ STAFF ─ -->
  <section id="sec-staff" style="display:none">
    <div class="page-title">👥 Staff Statistics</div>
    <div class="section" id="staff-table-wrap">
      <div class="loading"><div>⏳</div>Loading…</div>
    </div>
  </section>
</main>

<script>
// ── Config ──────────────────────────────────────────────────
// CHANGE THIS to the URL where dashboard_export.json is served.
// Option A: Same Netlify site → just '/dashboard_export.json'
// Option B: Raw from GitHub → 'https://raw.githubusercontent.com/YOU/REPO/main/data/dashboard_export.json'
// Option C: Any public URL
const DATA_URL = '/dashboard_export.json';

let _data = null;
let _charts = {};

// ── Section navigation ───────────────────────────────────────
function showSection(id) {
  ['overview','tickets','staff'].forEach(s => {
    document.getElementById(`sec-${s}`).style.display = s === id ? '' : 'none';
  });
  document.querySelectorAll('nav a').forEach((a, i) => {
    a.classList.toggle('active', i === ['overview','tickets','staff'].indexOf(id));
  });
}

// ── Load data ────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(`${DATA_URL}?_=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _data = await res.json();
    renderAll(_data);
    document.getElementById('error-banner').style.display = 'none';
  } catch(e) {
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.textContent = `⚠️ Could not load dashboard data: ${e.message}. Make sure dashboard_export.json is accessible at ${DATA_URL}`;
  }
}

// ── Render ───────────────────────────────────────────────────
function renderAll(d) {
  const tickets = d.tickets || [];

  document.getElementById('updated').textContent =
    `Last updated: ${new Date(d.generated_at).toLocaleString()}`;

  // Stat cards
  document.getElementById('stat-cards').innerHTML = `
    <div class="card"><div class="card-label">Total Tickets</div><div class="card-value">${d.total_tickets||0}</div></div>
    <div class="card green"><div class="card-label">Open Tickets</div><div class="card-value">${d.open_tickets||0}</div></div>
    <div class="card red"><div class="card-label">Closed</div><div class="card-value">${(d.total_tickets||0)-(d.open_tickets||0)}</div></div>
    <div class="card yellow"><div class="card-label">Avg Rating</div><div class="card-value">${d.avg_rating||0}⭐</div></div>
    <div class="card"><div class="card-label">Staff Members</div><div class="card-value">${(d.staff_stats||[]).length}</div></div>
  `;

  // Charts
  const cats = {};
  tickets.forEach(t => { cats[t.category||'unknown'] = (cats[t.category||'unknown']||0)+1; });
  renderChart('catChart','doughnut', Object.keys(cats), Object.values(cats),
    ['#5865f2','#23a559','#f0b232','#f23f43','#eb459e','#57f287','#00b0f4','#faa61a']);

  renderChart('statusChart','bar',
    ['Open','Closed'],
    [d.open_tickets||0,(d.total_tickets||0)-(d.open_tickets||0)],
    ['rgba(35,165,89,.7)','rgba(242,63,67,.7)']);

  // Tickets table
  document.getElementById('tickets-table-wrap').innerHTML = tickets.length ? `
    <table>
      <thead><tr>
        <th>#</th><th>Category</th><th>User</th><th>Priority</th><th>Status</th><th>Opened</th>
      </tr></thead>
      <tbody>${tickets.slice().reverse().map(t => `
        <tr>
          <td><strong>#${t.number||'?'}</strong></td>
          <td>${(t.category||'?').replace(/-/g,' ')}</td>
          <td>${t.username||'?'}</td>
          <td><span class="badge badge-${(t.priority||'normal').toLowerCase()}">${t.priority||'Normal'}</span></td>
          <td><span class="badge badge-${t.status||'open'}">${(t.status||'open').toUpperCase()}</span></td>
          <td>${(t.created_at||'').slice(0,16).replace('T',' ')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="loading"><div>🎫</div>No tickets yet.</div>`;

  // Staff table
  const staff = d.staff_stats || [];
  document.getElementById('staff-table-wrap').innerHTML = staff.length ? `
    <table>
      <thead><tr><th>Staff ID</th><th>Claimed</th><th>Closed</th><th>Avg Response</th></tr></thead>
      <tbody>${staff.map(s => {
        const avg = s.count > 0 ? Math.round(s.total_ms/s.count/1000)+'s' : '—';
        return `<tr>
          <td><strong>${s[Object.keys(s)[0]]||'?'}</strong></td>
          <td>${s.claimed||0}</td>
          <td>${s.closed||0}</td>
          <td>${avg}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : `<div class="loading"><div>👥</div>No staff data yet.</div>`;
}

function renderChart(id, type, labels, data, bgColors) {
  if (_charts[id]) { _charts[id].destroy(); }
  const ctx = document.getElementById(id).getContext('2d');
  _charts[id] = new Chart(ctx, {
    type,
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: bgColors,
        borderWidth: 0,
        borderRadius: type==='bar' ? 6 : 0,
      }]
    },
    options: {
      plugins: {
        legend: {
          display: type !== 'bar',
          labels: { color:'#dbdee1', font:{ size:12 } }
        }
      },
      scales: type==='bar' ? {
        x:{ ticks:{color:'#80848e'}, grid:{color:'rgba(63,65,71,.5)'} },
        y:{ ticks:{color:'#80848e'}, grid:{color:'rgba(63,65,71,.5)'}, beginAtZero:true },
      } : undefined,
      cutout: type==='doughnut' ? '60%' : undefined,
    }
  });
}

// Auto-refresh every 60s
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
